services:
  postgres:
    image: postgres:16-alpine
    container_name: developeros-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: developeros
      POSTGRES_PASSWORD: developeros
      POSTGRES_DB: developeros_dev
    ports:
      - '5432:5432'
    volumes:
      - developeros_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U developeros -d developeros_dev']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  developeros_pgdata:
    name: developeros_pgdata
