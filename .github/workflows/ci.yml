name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Placeholder values used only for CI validation and non-production tests.
  # They never connect to a production system.
  DATABASE_URL: postgresql://developeros:developeros@localhost:5432/developeros_test
  JWT_ACCESS_SECRET: ci-access-secret-ci-access-secret-000001
  JWT_REFRESH_SECRET: ci-refresh-secret-ci-refresh-secret-00001

jobs:
  quality:
    name: Format, typecheck, lint, unit tests, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @developeros/api exec prisma generate

      - name: Validate Prisma schema
        run: pnpm --filter @developeros/api run prisma:validate

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  api-liveness-e2e:
    name: API liveness e2e (database-independent)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @developeros/api exec prisma generate

      - name: Build workspace packages
        run: pnpm --filter "./packages/*" build

      - name: Run API liveness e2e
        run: pnpm --filter @developeros/api test:e2e

  api-integration:
    name: API database integration (PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: developeros
          POSTGRES_PASSWORD: developeros
          POSTGRES_DB: developeros_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U developeros -d developeros_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @developeros/api exec prisma generate

      - name: Build workspace packages
        run: pnpm --filter "./packages/*" build

      - name: Apply migrations
        run: pnpm --filter @developeros/api run prisma:deploy

      - name: Run database integration tests
        run: pnpm --filter @developeros/api test:integration

  web-e2e:
    name: Web E2E (API + web running)
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @developeros/api exec prisma generate

      - name: Build packages, API, and web
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm --filter @developeros/web exec playwright install --with-deps chromium

      - name: Run web E2E
        run: pnpm --filter @developeros/web test:e2e
